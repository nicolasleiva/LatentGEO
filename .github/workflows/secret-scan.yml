name: Secret Scan

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        run: python -m pip install --upgrade "detect-secrets==1.5.0"

      - name: Normalize detect-secrets baseline paths for Linux runners
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          baseline_path = Path(".secrets.baseline")
          payload = json.loads(baseline_path.read_text(encoding="utf-8"))
          results = payload.get("results", {})

          normalized_results = {}
          for file_path, findings in results.items():
              normalized_path = str(file_path).replace("\\", "/")
              normalized_findings = []
              for finding in findings:
                  normalized_finding = dict(finding)
                  filename = normalized_finding.get("filename")
                  if isinstance(filename, str):
                      normalized_finding["filename"] = filename.replace("\\", "/")
                  normalized_findings.append(normalized_finding)
              normalized_results[normalized_path] = normalized_findings

          payload["results"] = dict(sorted(normalized_results.items()))
          baseline_path.write_text(
              json.dumps(payload, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Stage normalized baseline for detect-secrets
        run: git add .secrets.baseline

      - name: Run detect-secrets hook against security-relevant files
        run: |
          python -m detect_secrets.pre_commit_hook --baseline .secrets.baseline \
            $(git ls-files backend .github scripts \
              SECURITY_IMPROVEMENTS.md \
              docs/security-history-sanitization-runbook.md \
              .checkov.yml \
              .pre-commit-config.yaml)

      - name: Run TruffleHog (verified secrets only)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified
