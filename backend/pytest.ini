[pytest]
# Canonical backend pytest config (used both locally and in Docker).
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

addopts =
    --strict-markers
    -ra
    --tb=short
    --capture=no

markers =
    integration: Integration tests with real services
    slow: Long-running tests
    unit: Unit tests without external dependencies
    e2e: End-to-end tests
    live: Live end-to-end tests against external targets
    asyncio: Async test execution marker

log_cli = true
log_cli_level = INFO
junit_family = xunit2

filterwarnings =
    # Sporadic teardown noise from pytest/pluggy on Windows socket finalizers.
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::pluggy.PluggyTeardownRaisedWarning
